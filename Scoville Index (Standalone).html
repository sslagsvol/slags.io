document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    // Google Analytics (GA4) — injected into the template head so it survives
    // the documentElement swap below. Inline bootstrap (no src) appends the
    // async gtag.js loader at runtime, so it never blocks the page's scripts.
    const gaSnippet = '<script>window.dataLayer=window.dataLayer||[];' +
      'function gtag(){dataLayer.push(arguments);}window.gtag=gtag;' +
      'gtag("js",new Date());gtag("config","G-WZGPQSX3XJ");' +
      'var gaS=document.createElement("script");gaS.async=1;' +
      'gaS.src="https://www.googletagmanager.com/gtag/js?id=G-WZGPQSX3XJ";' +
      'document.head.appendChild(gaS);</' + 'script>';
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + gaSnippet + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f84dfc5c-10b4-4543-9fe0-844b86eb0d73\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\nbody{margin:0;background:#FFFFFF;-webkit-font-smoothing:antialiased}\ninput,select,button{font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif}\ninput[type=range]{accent-color:var(--accent)}\n@keyframes galaxySwirl{0%{background-position:0 0,0% 50%}100%{background-position:0 0,200% 50%}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--accent:{{ theme.accent }};--ink:{{ theme.ink }};--type-scale:{{ theme.typeScale }};--space-scale:{{ theme.spaceScale }};font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--ink);max-width:1240px;margin:0 auto;padding:calc(56px * var(--space-scale)) calc(48px * var(--space-scale)) calc(80px * var(--space-scale))\">\n\n  <!-- MASTHEAD -->\n  <div data-screen-label=\"Masthead\" style=\"display:flex;flex-direction:column;gap:0\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:calc(24px * var(--space-scale))\">\n      <div style=\"display:flex;align-items:center;gap:calc(20px * var(--space-scale))\">\n        <h1 style=\"margin:0;font-size:calc(72px * var(--type-scale));font-weight:700;letter-spacing:-0.04em;line-height:0.95\">Scoville<span style=\"color:var(--accent)\">.<\u002Fspan><\u002Fh1>\n        <a href=\"Scoville Galaxy (Standalone).html\" style=\"display:inline-flex;align-items:center;gap:6px;padding:calc(9px * var(--space-scale)) calc(18px * var(--space-scale));border-radius:999px;border:2px solid transparent;background:linear-gradient(#FFFFFF,#FFFFFF) padding-box,linear-gradient(100deg,#38BDF8,#E879F9,#FDBA74,#818CF8,#38BDF8) border-box;background-size:100% 100%,300% 300%;background-position:0 0,0% 50%;animation:galaxySwirl 5s linear infinite;font-size:calc(11px * var(--type-scale));font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);text-decoration:none\">Galaxy view ↗<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-size:calc(11px * var(--type-scale));letter-spacing:0.14em;text-transform:uppercase;color:#767676;text-align:right\">A disputed index of hot-sauce heat<br>Hot Ones Season 30 + benchmarks<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:8px;background:var(--accent);margin-top:calc(20px * var(--space-scale))\"><\u002Fdiv>\n    <p style=\"margin:calc(16px * var(--space-scale)) 0 0;font-size:calc(13px * var(--type-scale));line-height:1.5;color:#444444;max-width:640px\">Every sauce below carries several numbers: what the maker claims, and the range independent evidence suggests. They rarely agree. That is the point.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- PEPPER SCALE -->\n  <div data-screen-label=\"Pepper scale\" style=\"margin-top:calc(40px * var(--space-scale));padding-top:calc(20px * var(--space-scale));border-top:1px solid #E8E8E8\">\n    <div onclick=\"{{ onTogglePeppers }}\" style=\"display:flex;justify-content:space-between;align-items:baseline;cursor:pointer\">\n      <div style=\"display:flex;align-items:baseline;gap:calc(10px * var(--space-scale))\">\n        <span style=\"font-size:calc(13px * var(--type-scale));font-weight:700;color:var(--accent);width:14px;display:inline-block;text-align:center\">{{ pepperChevron }}<\u002Fspan>\n        <span style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Peppers, for scale<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">{{ pepperScaleLabel }} scale<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ pepperOpen }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:relative;height:20px;margin-top:calc(18px * var(--space-scale))\">\n        <sc-for list=\"{{ pepperTicks }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <span style=\"position:absolute;left:{{ t.left }}%;transform:translateX({{ t.tx }});bottom:2px;font-size:calc(10px * var(--type-scale));color:#767676;font-variant-numeric:tabular-nums;white-space:nowrap\">{{ t.label }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:{{ pepperStripH }}px\">\n        <span style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:#E8E8E8\"><\u002Fspan>\n        <sc-for list=\"{{ pepperTicks }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <span style=\"position:absolute;left:{{ t.left }}%;top:50%;transform:translate(-50%,-50%);width:1px;height:10px;background:#D4D4D4\"><\u002Fspan>\n        <\u002Fsc-for>\n        <sc-for list=\"{{ pepperMarkers }}\" as=\"m\" hint-placeholder-count=\"6\">\n          <div style=\"position:absolute;left:{{ m.left }}%;top:0;bottom:0;width:0\">\n            <span style=\"position:absolute;left:0;top:{{ m.lineTop }}px;transform:translateX(-50%);width:1px;height:{{ m.lineHeight }}px;background:#D4D4D4\"><\u002Fspan>\n            <span style=\"position:absolute;left:0;top:{{ m.iconTop }}px;transform:translate(-50%,-50%) rotate(45deg);width:{{ m.size }}px;height:{{ m.size }}px;border-radius:0 50% 50% 50%;background:var(--accent)\"><\u002Fspan>\n            <div style=\"position:absolute;left:{{ m.labelShiftPx }}px;top:{{ m.labelTop }}px;transform:translate(-50%,{{ m.labelTy }});text-align:center;white-space:nowrap\">\n              <div style=\"font-size:calc(10px * var(--type-scale));font-weight:700;letter-spacing:0.02em\">{{ m.name }}<\u002Fdiv>\n              <div style=\"font-size:calc(9px * var(--type-scale));color:#767676;font-variant-numeric:tabular-nums;margin-top:2px\">{{ m.guessFmt }} SHU<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:calc(10px * var(--space-scale));font-size:calc(10px * var(--type-scale));color:#767676;letter-spacing:0.04em\">Best-guess SHU for common peppers — reference only, not part of the ranking below.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- CONTROLS -->\n  <div data-screen-label=\"Filters\" style=\"display:flex;flex-wrap:wrap;gap:calc(32px * var(--space-scale));align-items:flex-end;margin-top:calc(44px * var(--space-scale));padding-bottom:calc(20px * var(--space-scale));border-bottom:1px solid var(--ink)\">\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale))\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Source<\u002Fdiv>\n      <div style=\"display:flex;gap:0\">\n        <sc-for list=\"{{ catChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ c.onPick }}\" style=\"border:1px solid var(--ink);margin-left:-1px;padding:calc(7px * var(--space-scale)) calc(14px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;background:{{ c.bg }};color:{{ c.fg }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale))\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Scale<\u002Fdiv>\n      <div style=\"display:flex;gap:0\">\n        <sc-for list=\"{{ scaleChips }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ c.onPick }}\" style=\"border:1px solid var(--ink);margin-left:-1px;padding:calc(7px * var(--space-scale)) calc(14px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;background:{{ c.bg }};color:{{ c.fg }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale))\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Reading<\u002Fdiv>\n      <select value=\"{{ metric }}\" onchange=\"{{ onMetric }}\" style=\"border:1px solid var(--ink);background:#FFFFFF;padding:calc(7px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;-webkit-appearance:none;appearance:none\">\n        <option value=\"guess\">Best guess<\u002Foption>\n        <option value=\"claimed\">Claimed<\u002Foption>\n        <option value=\"low\">Low estimate<\u002Foption>\n        <option value=\"high\">High estimate<\u002Foption>\n        <option value=\"your\">Your score<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale))\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Order<\u002Fdiv>\n      <select value=\"{{ sort }}\" onchange=\"{{ onSort }}\" style=\"border:1px solid var(--ink);background:#FFFFFF;padding:calc(7px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;-webkit-appearance:none;appearance:none\">\n        <option value=\"heat-asc\">Mild to hot<\u002Foption>\n        <option value=\"heat-desc\">Hot to mild<\u002Foption>\n        <option value=\"name\">Name A–Z<\u002Foption>\n        <option value=\"dispute\">Most uncertain<\u002Foption>\n        <option value=\"inflation\">Most inflated claim<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale))\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Claims<\u002Fdiv>\n      <button onclick=\"{{ onIgnoreClaimed }}\" style=\"border:1px solid var(--ink);padding:calc(7px * var(--space-scale)) calc(14px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;background:{{ ignoreClaimedBg }};color:{{ ignoreClaimedFg }}\">Ignore claimed values<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:calc(8px * var(--space-scale));flex:1;min-width:160px\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Search<\u002Fdiv>\n      <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" placeholder=\"Sauce or maker\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(7px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- LEGEND -->\n  <div style=\"display:flex;flex-wrap:wrap;gap:calc(28px * var(--space-scale));align-items:center;margin-top:calc(16px * var(--space-scale));font-size:calc(10px * var(--type-scale));letter-spacing:0.1em;text-transform:uppercase;color:#444444\">\n    <div style=\"display:flex;align-items:center;gap:calc(8px * var(--space-scale))\"><span style=\"width:26px;height:8px;background:#D4D4D4;display:inline-block\"><\u002Fspan>Estimated range (low–high)<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:calc(8px * var(--space-scale))\"><span style=\"width:11px;height:11px;background:var(--accent);display:inline-block\"><\u002Fspan>Best guess<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:calc(8px * var(--space-scale))\"><span style=\"width:10px;height:10px;border:1.5px solid var(--ink);border-radius:50%;background:#FFFFFF;display:inline-block\"><\u002Fspan>Claimed by maker<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:calc(8px * var(--space-scale))\"><span style=\"width:10px;height:10px;border:2px solid var(--accent);background:#FFFFFF;display:inline-block;transform:rotate(45deg)\"><\u002Fspan>Your score<\u002Fdiv>\n    <div style=\"margin-left:auto;font-size:calc(10px * var(--type-scale));color:#767676;letter-spacing:0.1em\">{{ countLine }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CHART -->\n  <div data-screen-label=\"Chart\" style=\"margin-top:calc(20px * var(--space-scale))\">\n    <div style=\"display:grid;grid-template-columns:250px 1fr 120px;align-items:end\">\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;padding-bottom:calc(6px * var(--space-scale))\">Sauce<\u002Fdiv>\n      <div style=\"position:relative;height:22px\">\n        <sc-for list=\"{{ ticks }}\" as=\"t\" hint-placeholder-count=\"5\">\n          <span style=\"position:absolute;left:{{ t.left }}%;transform:translateX({{ t.tx }});bottom:6px;font-size:calc(10px * var(--type-scale));color:#767676;font-variant-numeric:tabular-nums;white-space:nowrap\">{{ t.label }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;padding-bottom:calc(6px * var(--space-scale));text-align:right\">{{ metricLabel }} · SHU<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-top:2px solid var(--ink)\">\n      <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"10\">\n        <div>\n          <div onclick=\"{{ r.onToggle }}\" style=\"display:grid;grid-template-columns:250px 1fr 120px;align-items:center;border-bottom:1px solid #E8E8E8;cursor:pointer;background:{{ r.rowBg }}\" style-hover=\"background:#FAFAFA\">\n            <div style=\"padding:calc(13px * var(--space-scale)) calc(20px * var(--space-scale)) calc(13px * var(--space-scale)) 0\">\n              <div style=\"font-size:calc(12px * var(--type-scale));font-weight:700;text-transform:uppercase;letter-spacing:0.03em;line-height:1.25;font-style:{{ r.nameStyle }}\">{{ r.name }}<\u002Fdiv>\n              <div style=\"font-size:calc(10.5px * var(--type-scale));color:#767676;margin-top:calc(2px * var(--space-scale));display:flex;align-items:center;gap:calc(6px * var(--space-scale))\">\n                <span>{{ r.maker }}<\u002Fspan>\n                <sc-if value=\"{{ r.hasBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"background:{{ r.badgeBg }};color:{{ r.badgeFg }};font-weight:700;padding:calc(1px * var(--space-scale)) calc(5px * var(--space-scale));letter-spacing:0.06em;font-size:calc(9px * var(--type-scale))\">{{ r.packTag }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:relative;height:48px\">\n              <sc-for list=\"{{ ticks }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <span style=\"position:absolute;left:{{ t.left }}%;top:0;bottom:0;width:1px;background:#F0F0F0\"><\u002Fspan>\n              <\u002Fsc-for>\n              <span style=\"position:absolute;top:50%;transform:translateY(-50%);height:8px;background:#D4D4D4;left:{{ r.bandLeft }}%;width:{{ r.bandW }}%\"><\u002Fspan>\n              <span style=\"position:absolute;top:50%;left:{{ r.guessLeft }}%;transform:translate(-50%,-50%);width:11px;height:11px;background:var(--accent)\"><\u002Fspan>\n              <sc-if value=\"{{ r.hasClaimed }}\" hint-placeholder-val=\"{{ false }}\">\n                <span title=\"Claimed\" style=\"position:absolute;top:50%;left:{{ r.claimedLeft }}%;transform:translate(-50%,-50%);width:10px;height:10px;border:1.5px solid var(--ink);border-radius:50%;background:#FFFFFF\"><\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.hasYour }}\" hint-placeholder-val=\"{{ false }}\">\n                <span title=\"Your score\" style=\"position:absolute;top:50%;left:{{ r.yourLeft }}%;transform:translate(-50%,-50%) rotate(45deg);width:10px;height:10px;border:2px solid var(--accent);background:#FFFFFF\"><\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"text-align:right;padding:calc(13px * var(--space-scale)) 0\">\n              <sc-if value=\"{{ r.showClaimedLine }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:calc(11px * var(--type-scale));font-weight:400;text-decoration:line-through;color:#767676;font-variant-numeric:tabular-nums\">{{ r.claimedFmt }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font-size:calc(14px * var(--type-scale));font-weight:700;font-variant-numeric:tabular-nums\">{{ r.activeFmt }}<\u002Fdiv>\n              <div style=\"display:flex;justify-content:flex-end;gap:calc(4px * var(--space-scale));margin-top:calc(6px * var(--space-scale))\">\n                <sc-for list=\"{{ r.stars }}\" as=\"s\" hint-placeholder-count=\"5\">\n                  <span style=\"width:8px;height:8px;display:inline-block;border-radius:0 50% 50% 50%;transform:rotate(45deg);background:{{ s.bg }};border:{{ s.border }};box-sizing:border-box\"><\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ r.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-bottom:2px solid var(--ink);background:#FAFAFA;padding:calc(24px * var(--space-scale)) calc(24px * var(--space-scale)) calc(28px * var(--space-scale)) calc(24px * var(--space-scale))\">\n              <div style=\"display:flex;flex-wrap:wrap;gap:calc(40px * var(--space-scale))\">\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Claimed<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));font-variant-numeric:tabular-nums\">{{ r.claimedFmt }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Low estimate<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));font-variant-numeric:tabular-nums\">{{ r.lowFmt }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">High estimate<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));font-variant-numeric:tabular-nums\">{{ r.highFmt }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Best guess<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));color:var(--accent);font-variant-numeric:tabular-nums\">{{ r.guessFmt }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Claim inflation<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));font-variant-numeric:tabular-nums\">{{ r.inflationFmt }}<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676\">Your score<\u002Fdiv><div style=\"font-size:calc(18px * var(--type-scale));font-weight:700;margin-top:calc(4px * var(--space-scale));font-variant-numeric:tabular-nums\">{{ r.yourFmt }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 220px;gap:calc(48px * var(--space-scale));margin-top:calc(24px * var(--space-scale));align-items:end\">\n                <div>\n                  <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(10px * var(--space-scale))\">Adjust your heat score — where does it really sit?<\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"1000\" value=\"{{ r.sliderVal }}\" onchange=\"{{ r.onSlide }}\" style=\"width:100%;display:block\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:calc(9px * var(--type-scale));color:#767676;margin-top:calc(6px * var(--space-scale));font-variant-numeric:tabular-nums\"><span>100<\u002Fspan><span>1,000,000 (log)<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(10px * var(--space-scale))\">Burn rating<\u002Fdiv>\n                  <div style=\"display:flex;gap:calc(8px * var(--space-scale));align-items:center\">\n                    <sc-for list=\"{{ r.stars }}\" as=\"s\" hint-placeholder-count=\"5\">\n                      <button data-val=\"{{ s.v }}\" onclick=\"{{ r.onRate }}\" style=\"width:22px;height:22px;border:none;cursor:pointer;padding:0;background:none;display:flex;align-items:center;justify-content:center\">\n                        <span style=\"width:16px;height:16px;display:block;border-radius:0 50% 50% 50%;transform:rotate(45deg);background:{{ s.bg }};border:{{ s.border }};box-sizing:border-box;pointer-events:none\"><\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                    <span style=\"font-size:calc(10px * var(--type-scale));color:#767676;margin-left:calc(6px * var(--space-scale))\">{{ r.ratingWord }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:calc(16px * var(--space-scale));margin-top:calc(20px * var(--space-scale))\">\n                <sc-if value=\"{{ r.hasOverride }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ r.onReset }}\" style=\"border:1px solid var(--ink);background:#FFFFFF;padding:calc(6px * var(--space-scale)) calc(14px * var(--space-scale));font-size:calc(10px * var(--type-scale));letter-spacing:0.1em;text-transform:uppercase;cursor:pointer\">Reset my inputs<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isMine }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ r.onDelete }}\" style=\"border:1px solid var(--accent);color:var(--accent);background:#FFFFFF;padding:calc(6px * var(--space-scale)) calc(14px * var(--space-scale));font-size:calc(10px * var(--type-scale));letter-spacing:0.1em;text-transform:uppercase;cursor:pointer\">Delete sauce<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:calc(40px * var(--space-scale)) 0;font-size:calc(12px * var(--type-scale));color:#767676;letter-spacing:0.08em;text-transform:uppercase\">No sauces match — loosen a filter.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ADD SAUCE -->\n  <div data-screen-label=\"Add sauce\" style=\"margin-top:calc(56px * var(--space-scale));border-top:2px solid var(--ink);padding-top:calc(24px * var(--space-scale))\">\n    <div style=\"display:flex;align-items:baseline;gap:calc(16px * var(--space-scale))\">\n      <h2 style=\"margin:0;font-size:calc(20px * var(--type-scale));font-weight:700;letter-spacing:-0.01em\">Add a sauce<\u002Fh2>\n      <span style=\"font-size:calc(11px * var(--type-scale));color:#767676\">Only a name is required. Leave numbers blank if unknown — the range fills in around what you give.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:2fr 2fr 1fr 1fr 1fr auto;gap:calc(12px * var(--space-scale));margin-top:calc(16px * var(--space-scale));align-items:end\">\n      <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(6px * var(--space-scale))\">Sauce name<\u002Fdiv><input ref=\"{{ nameRef }}\" placeholder=\"e.g. Backyard Reaper\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(8px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\"><\u002Fdiv>\n      <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(6px * var(--space-scale))\">Maker<\u002Fdiv><input ref=\"{{ makerRef }}\" placeholder=\"Optional\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(8px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\"><\u002Fdiv>\n      <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(6px * var(--space-scale))\">Claimed SHU<\u002Fdiv><input ref=\"{{ claimedRef }}\" type=\"number\" placeholder=\"—\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(8px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\"><\u002Fdiv>\n      <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(6px * var(--space-scale))\">Low SHU<\u002Fdiv><input ref=\"{{ lowRef }}\" type=\"number\" placeholder=\"—\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(8px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\"><\u002Fdiv>\n      <div><div style=\"font-size:calc(9px * var(--type-scale));letter-spacing:0.16em;text-transform:uppercase;color:#767676;margin-bottom:calc(6px * var(--space-scale))\">High SHU<\u002Fdiv><input ref=\"{{ highRef }}\" type=\"number\" placeholder=\"—\" style=\"border:1px solid var(--ink);border-radius:0;padding:calc(8px * var(--space-scale)) calc(10px * var(--space-scale));font-size:calc(12px * var(--type-scale));width:100%;box-sizing:border-box;outline-color:var(--accent)\"><\u002Fdiv>\n      <button onclick=\"{{ onAdd }}\" style=\"border:none;background:var(--accent);color:#FFFFFF;padding:calc(9px * var(--space-scale)) calc(22px * var(--space-scale));font-size:calc(11px * var(--type-scale));letter-spacing:0.1em;text-transform:uppercase;font-weight:700;cursor:pointer\" style-hover=\"background:var(--ink)\">Add<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasAddError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:calc(10px * var(--space-scale));font-size:calc(11px * var(--type-scale));color:var(--accent)\">{{ addError }}<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- GUIDE -->\n  <sc-if value=\"{{ showGuide }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Guide\" style=\"margin-top:calc(64px * var(--space-scale));border-top:8px solid var(--ink);padding-top:calc(28px * var(--space-scale))\">\n      <h2 style=\"margin:0;font-size:calc(28px * var(--type-scale));font-weight:700;letter-spacing:-0.02em\">The fine print on heat<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:calc(36px * var(--space-scale));margin-top:calc(28px * var(--space-scale))\">\n        <div>\n          <div style=\"font-size:calc(40px * var(--type-scale));font-weight:700;color:var(--accent);line-height:1\">01<\u002Fdiv>\n          <div style=\"font-size:calc(11px * var(--type-scale));font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-top:calc(10px * var(--space-scale));padding-top:calc(10px * var(--space-scale));border-top:1px solid var(--ink)\">Why the numbers disagree<\u002Fdiv>\n          <p style=\"font-size:calc(12px * var(--type-scale));line-height:1.65;color:#444444;margin:calc(10px * var(--space-scale)) 0 0\">A Scoville rating is measured in a lab, but the number on the label is marketing. Makers often quote the rating of the <b>pepper<\u002Fb>, not the finished sauce — which is mostly vinegar, fruit, and vegetables diluting that pepper. Crops vary batch to batch, and the original Scoville test was literally a panel of humans sipping dilutions until they stopped feeling burn. When Season 25 sauces were sent for independent lab testing, most measured far below their claimed number. So we show the claim <i>and<\u002Fi> a plausible range — the truth usually lives between them.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:calc(40px * var(--type-scale));font-weight:700;color:var(--accent);line-height:1\">02<\u002Fdiv>\n          <div style=\"font-size:calc(11px * var(--type-scale));font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-top:calc(10px * var(--space-scale));padding-top:calc(10px * var(--space-scale));border-top:1px solid var(--ink)\">Not all heat is alike<\u002Fdiv>\n          <p style=\"font-size:calc(12px * var(--type-scale));line-height:1.65;color:#444444;margin:calc(10px * var(--space-scale)) 0 0\">Chili heat comes from a family of capsaicinoids, and the mix changes the experience: some hit the tip of the tongue instantly, others creep into the throat a minute later. Your own sensitivity varies too — the receptor that senses capsaicin (TRPV1) desensitizes with regular exposure, which is why chiliheads genuinely feel less. And other “spicy” foods work on different nerves entirely: black pepper’s piperine is milder, wasabi and mustard hit the nose, ginger barely registers on the same scale. SHU only measures capsaicinoids.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:calc(40px * var(--type-scale));font-weight:700;color:var(--accent);line-height:1\">03<\u002Fdiv>\n          <div style=\"font-size:calc(11px * var(--type-scale));font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-top:calc(10px * var(--space-scale));padding-top:calc(10px * var(--space-scale));border-top:1px solid var(--ink)\">What to expect<\u002Fdiv>\n          <p style=\"font-size:calc(12px * var(--type-scale));line-height:1.65;color:#444444;margin:calc(10px * var(--space-scale)) 0 0\">Capsaicin tricks nerves into reporting heat — nothing is actually burning. Typical responses: burning lips and tongue, sweating, a flushed face, runny nose, watery eyes, and hiccups. At the top of this chart, add a racing heart, stomach cramping, and occasionally nausea. It peaks within a few minutes and fades as the receptors exhaust themselves. Unpleasant, temporary, and — for a healthy adult — not harmful. The pain is real; the damage is not.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:calc(40px * var(--type-scale));font-weight:700;color:var(--accent);line-height:1\">04<\u002Fdiv>\n          <div style=\"font-size:calc(11px * var(--type-scale));font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-top:calc(10px * var(--space-scale));padding-top:calc(10px * var(--space-scale));border-top:1px solid var(--ink)\">How to put it out<\u002Fdiv>\n          <p style=\"font-size:calc(12px * var(--type-scale));line-height:1.65;color:#444444;margin:calc(10px * var(--space-scale)) 0 0\">Capsaicin dissolves in fat, not water. <b>Whole milk is the proven remedy<\u002Fb> — its casein protein pulls capsaicin off the receptor; yogurt and ice cream work the same way. Sugar water or honey measurably helps. Starches (bread, rice) give modest relief. Plain water and beer mostly spread the oil around, and carbonation can make it sting more. Cold anything numbs temporarily. Failing all that: time. Fifteen minutes and the nerves stand down on their own.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:calc(40px * var(--space-scale));border-top:1px solid #E8E8E8;padding-top:calc(14px * var(--space-scale));font-size:calc(10px * var(--type-scale));line-height:1.7;color:#767676;max-width:880px\">\n        Method — Claimed SHU: official Hot Ones / HEATONIST figures, or commonly cited manufacturer numbers for benchmarks. Low/High: plausible range for the finished sauce based on ingredient dilution and precedent from independent lab testing of a prior season. Best guess: midpoint informed by the pepper’s position in the ingredient list. These are informed estimates, not lab measurements; no independent test of the Season 30 pack has been published. Reference: HPLC lab testing of Season 25 sauces (Howtown, Dec 2024) found most sauces well below claimed SHU.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:1400},&quot;showGuide&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;startScale&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;log&quot;,&quot;linear&quot;],&quot;default&quot;:&quot;linear&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Chart&quot;},&quot;colorScheme&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[[&quot;#E1251B&quot;,&quot;#111111&quot;],[&quot;#C2410C&quot;,&quot;#1C1410&quot;],[&quot;#2F6B3A&quot;,&quot;#14201A&quot;],[&quot;#7C2D6B&quot;,&quot;#1F1420&quot;]],&quot;default&quot;:[&quot;#E1251B&quot;,&quot;#111111&quot;],&quot;tsType&quot;:&quot;string[]&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;typeScale&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0.85,&quot;max&quot;:1.3,&quot;step&quot;:0.05,&quot;default&quot;:1.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;spaceScale&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0.7,&quot;max&quot;:1.4,&quot;step&quot;:0.05,&quot;default&quot;:1.2,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Appearance&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.SEED = [\n      { id: 'tb-mild', name: 'Taco Bell Mild Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, claimed: null, low: 200, high: 600, guess: 400 },\n      { id: 'franks', name: \"Frank's RedHot\", maker: \"McIlhenny/Frank's\", cat: 'Benchmark', pack: null, claimed: 450, low: 400, high: 500, guess: 450 },\n      { id: 'louisiana', name: 'Louisiana Hot Sauce', maker: 'Bruce Foods', cat: 'Benchmark', pack: null, claimed: 450, low: 400, high: 600, guess: 450 },\n      { id: 'tb-hot', name: 'Taco Bell Hot Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, claimed: null, low: 500, high: 1200, guess: 800 },\n      { id: 'cholula-jal', name: 'Cholula Jalapeño', maker: 'Cholula', cat: 'Benchmark', pack: null, claimed: null, low: 700, high: 1500, guess: 1000 },\n      { id: 'cholula-chip', name: 'Cholula Chipotle', maker: 'Cholula', cat: 'Benchmark', pack: null, claimed: null, low: 1000, high: 2500, guess: 1500 },\n      { id: 'shishito', name: \"That's What Shishito Said\", maker: 'Down to Ferment', cat: 'Season 30 Pack', pack: 1, claimed: 2100, low: 1500, high: 2500, guess: 2000 },\n      { id: 'tb-diablo', name: 'Taco Bell Diablo Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, claimed: null, low: 1200, high: 2800, guess: 2000 },\n      { id: 'sriracha', name: 'Huy Fong Sriracha', maker: 'Huy Fong Foods', cat: 'Benchmark', pack: null, claimed: 2200, low: 1800, high: 2500, guess: 2200 },\n      { id: 'hot-bergine', name: 'Hot Bergine', maker: 'Good Heat', cat: 'Season 30 Pack', pack: 2, claimed: 7900, low: 1500, high: 4000, guess: 2500 },\n      { id: 'marie-sharps', name: \"Marie Sharp's Original Hot Habanero\", maker: \"Marie Sharp's\", cat: 'Benchmark', pack: null, claimed: 3000, low: 2000, high: 5000, guess: 3000 },\n      { id: 'tabasco', name: 'Tabasco Original', maker: 'McIlhenny Co.', cat: 'Benchmark', pack: null, claimed: 3750, low: 2500, high: 5000, guess: 3500 },\n      { id: 'pickled-garlic', name: 'Pickled Garlic Sriracha', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 3, claimed: 18000, low: 3000, high: 7000, guess: 5000 },\n      { id: 'chickpotle', name: 'Chickpotle', maker: 'Black Eyed Susan', cat: 'Season 30 Pack', pack: 4, claimed: 32000, low: 5000, high: 15000, guess: 9000 },\n      { id: 'tropical-amarillo', name: 'Tropical Amarillo', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 6, claimed: 69000, low: 10000, high: 30000, guess: 18000 },\n      { id: 'eight-dragon', name: '8 Dragon', maker: 'Sinai Gourmet', cat: 'Season 30 Pack', pack: 7, claimed: 102000, low: 10000, high: 40000, guess: 20000 },\n      { id: 'pikliz', name: 'Pikliz N Scorpion', maker: 'Hot N Saucy', cat: 'Season 30 Pack', pack: 5, claimed: 54000, low: 15000, high: 40000, guess: 25000 },\n      { id: 'xxx-salsa', name: 'XXX Salsa Vibes', maker: 'High Desert Sauce Co.', cat: 'Season 30 Pack', pack: 9, claimed: 820000, low: 40000, high: 120000, guess: 70000 },\n      { id: 'number-8', name: '\"#8\"', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 8, claimed: 135600, low: 100000, high: 200000, guess: 150000 },\n      { id: 'last-dab', name: 'Last Dab Thermageddon', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 10, claimed: 2693000, low: 80000, high: 300000, guess: 150000 }\n    ];\n    this.PEPPERS = [\n      { id: 'pep-poblano', name: 'Poblano', guess: 1500 },\n      { id: 'pep-jalapeno', name: 'Jalapeño', guess: 5000 },\n      { id: 'pep-calabrian', name: 'Calabrian', guess: 14000 },\n      { id: 'pep-serrano', name: 'Serrano', guess: 17000 },\n      { id: 'pep-cayenne', name: 'Cayenne', guess: 40000 },\n      { id: 'pep-thai', name: 'Thai Chili', guess: 75000 },\n      { id: 'pep-habanero', name: 'Habanero', guess: 200000 },\n      { id: 'pep-scotch', name: 'Scotch Bonnet', guess: 225000 },\n      { id: 'pep-ghost', name: 'Ghost Pepper', guess: 1000000 },\n      { id: 'pep-scorpion', name: 'Trinidad Moruga Scorpion', guess: 1500000 },\n      { id: 'pep-reaper', name: 'Carolina Reaper', guess: 1640000 },\n      { id: 'pep-x', name: 'Pepper X', guess: 2500000 }\n    ];\n    this.state = {\n      userSauces: [], overrides: {},\n      cats: [], query: '', metric: 'guess', sort: 'heat-desc',\n      scale: null, ignoreClaimed: false, expandedId: null, addError: '',\n      pepperOpen: false\n    };\n    this.nameRef = React.createRef();\n    this.makerRef = React.createRef();\n    this.claimedRef = React.createRef();\n    this.lowRef = React.createRef();\n    this.highRef = React.createRef();\n  }\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('scoville-index-v1');\n      if (raw) {\n        const d = JSON.parse(raw);\n        this.setState({ userSauces: d.userSauces || [], overrides: d.overrides || {} });\n      }\n    } catch (e) {}\n  }\n\n  persist(next) {\n    const s = Object.assign({}, this.state, next);\n    try {\n      localStorage.setItem('scoville-index-v1', JSON.stringify({ userSauces: s.userSauces, overrides: s.overrides }));\n    } catch (e) {}\n  }\n\n  scaleMode() { return this.state.scale || this.props.startScale || 'log'; }\n\n  niceCeil(v) {\n    if (v <= 0) return 100;\n    const exp = Math.floor(Math.log10(v));\n    const base = Math.pow(10, exp);\n    const mult = v / base;\n    const niceMult = mult <= 1 ? 1 : mult <= 2 ? 2 : mult <= 5 ? 5 : 10;\n    return niceMult * base;\n  }\n\n  niceFloor(v) {\n    if (v <= 0) return 1;\n    const exp = Math.floor(Math.log10(v));\n    const base = Math.pow(10, exp);\n    const mult = v / base;\n    const niceMult = mult >= 5 ? 5 : mult >= 2 ? 2 : 1;\n    return niceMult * base;\n  }\n\n  pos(v, domain) {\n    if (v == null) return null;\n    if (this.scaleMode() === 'linear') {\n      return Math.max(0, Math.min(100, (v - domain.min) / (domain.max - domain.min) * 100));\n    }\n    const p = (Math.log10(Math.max(v, domain.min)) - Math.log10(domain.min)) / (Math.log10(domain.max) - Math.log10(domain.min)) * 100;\n    return Math.max(0, Math.min(100, p));\n  }\n\n  toggleCat(key) {\n    const cats = this.state.cats.includes(key) ? this.state.cats.filter(c => c !== key) : this.state.cats.concat([key]);\n    this.setState({ cats });\n  }\n\n  setOverride(id, patch) {\n    const overrides = Object.assign({}, this.state.overrides);\n    overrides[id] = Object.assign({}, overrides[id] || {}, patch);\n    this.setState({ overrides });\n    this.persist({ overrides });\n  }\n\n  renderVals() {\n    const st = this.state;\n    const fmt = (n) => (n == null || isNaN(n)) ? '—' : Math.round(n).toLocaleString('en-US');\n    const scale = this.scaleMode();\n    const schemeArr = Array.isArray(this.props.colorScheme) && this.props.colorScheme.length >= 2 ? this.props.colorScheme : ['#E1251B', '#111111'];\n    const theme = {\n      accent: schemeArr[0],\n      ink: schemeArr[1],\n      typeScale: this.props.typeScale != null ? this.props.typeScale : 1,\n      spaceScale: this.props.spaceScale != null ? this.props.spaceScale : 1\n    };\n    const metric = st.metric;\n    const all = this.SEED.concat(st.userSauces);\n\n    // build view rows\n    let rows = all.map((s) => {\n      const ov = st.overrides[s.id] || {};\n      const your = ov.your != null ? ov.your : null;\n      const rating = ov.rating || 0;\n      const activeVal = metric === 'your' ? (your != null ? your : null)\n        : metric === 'claimed' ? s.claimed\n        : metric === 'low' ? s.low\n        : metric === 'high' ? s.high : s.guess;\n      return Object.assign({}, s, { your, rating, activeVal, isMine: s.cat === 'My sauces' });\n    });\n\n    // filters\n    if (st.cats.length > 0) {\n      rows = rows.filter(r =>\n        (st.cats.includes('pack') && r.cat === 'Season 30 Pack') ||\n        (st.cats.includes('bench') && r.cat === 'Benchmark') ||\n        (st.cats.includes('mine') && r.isMine)\n      );\n    }\n    const q = st.query.trim().toLowerCase();\n    if (q) rows = rows.filter(r => (r.name + ' ' + r.maker).toLowerCase().includes(q));\n\n    // sort\n    const sortVal = r => r.activeVal != null ? r.activeVal : r.guess;\n    if (st.sort === 'heat-asc') rows.sort((a, b) => sortVal(a) - sortVal(b));\n    if (st.sort === 'heat-desc') rows.sort((a, b) => sortVal(b) - sortVal(a));\n    if (st.sort === 'name') rows.sort((a, b) => a.name.localeCompare(b.name));\n    if (st.sort === 'dispute') rows.sort((a, b) => (b.high / b.low) - (a.high / a.low));\n    if (st.sort === 'inflation') rows.sort((a, b) => ((b.claimed || 0) / b.guess) - ((a.claimed || 0) / a.guess));\n\n    const metricLabels = { guess: 'Best guess', claimed: 'Claimed', low: 'Low estimate', high: 'High estimate', your: 'Your score' };\n    const RATING_WORDS = ['Unrated', 'Condiment', 'Warm', 'Hot', 'Punishing', 'Regret'];\n\n    // domain adapts to whichever sauces are currently visible, and to whether claims are shown\n    const domainVals = [];\n    rows.forEach(r => {\n      domainVals.push(r.low, r.high, r.guess);\n      if (r.your != null) domainVals.push(r.your);\n      if (!st.ignoreClaimed && r.claimed != null) domainVals.push(r.claimed);\n    });\n    if (domainVals.length === 0) domainVals.push(100, 1000000);\n    const SHU_MAX = 2500000; // hard ceiling of the SHU scale\n    const rawMin = Math.min(...domainVals), rawMax = Math.max(...domainVals);\n    const domain = this.scaleMode() === 'linear'\n      ? { min: 0, max: Math.min(this.niceCeil(rawMax), SHU_MAX) }\n      : { min: Math.min(this.niceFloor(rawMin), 100), max: Math.min(Math.max(this.niceCeil(rawMax), 1000), SHU_MAX) };\n\n    const viewRows = rows.map((r) => {\n      const hasClaimed = r.claimed != null && !st.ignoreClaimed;\n      const bandL = this.pos(r.low, domain), bandR = this.pos(r.high, domain);\n      const expanded = st.expandedId === r.id;\n      const sliderBase = r.your != null ? r.your : r.guess;\n      const sliderVal = Math.round(Math.max(0, Math.min(1000, (Math.log10(Math.max(sliderBase, 100)) - 2) / 4 * 1000)));\n      const hasOverride = r.your != null || r.rating > 0;\n      const packTag = r.pack ? 'NO. ' + r.pack : (r.isMine ? 'YOURS' : '');\n      return {\n        name: r.name, maker: r.maker,\n        nameStyle: 'normal',\n        packTag, hasBadge: !!packTag,\n        badgeBg: 'transparent',\n        badgeFg: 'var(--accent)',\n        bandLeft: bandL, bandW: Math.max(bandR - bandL, 0.4),\n        guessLeft: this.pos(r.guess, domain),\n        hasClaimed, claimedLeft: this.pos(r.claimed, domain),\n        showClaimedLine: hasClaimed && metric !== 'claimed',\n        hasYour: r.your != null, yourLeft: this.pos(r.your, domain),\n        activeFmt: fmt(r.activeVal),\n        ratingLine: r.rating > 0 ? RATING_WORDS[r.rating].toUpperCase() : (expanded ? 'CLOSE' : 'DETAILS'),\n        rowBg: expanded ? '#FAFAFA' : '#FFFFFF',\n        expanded,\n        claimedFmt: fmt(r.claimed), lowFmt: fmt(r.low), highFmt: fmt(r.high), guessFmt: fmt(r.guess),\n        yourFmt: r.your != null ? fmt(r.your) : '—',\n        inflationFmt: r.claimed != null ? '×' + (r.claimed / r.guess).toFixed(1) : '—',\n        sliderVal,\n        ratingWord: RATING_WORDS[r.rating],\n        stars: [1, 2, 3, 4, 5].map(v => ({ v, bg: v <= r.rating ? 'var(--accent)' : '#FFFFFF', border: v <= r.rating ? 'none' : '1.3px solid var(--ink)' })),\n        hasOverride, isMine: r.isMine,\n        onToggle: () => this.setState({ expandedId: expanded ? null : r.id }),\n        onSlide: (e) => {\n          const t = +e.target.value;\n          const shu = Math.pow(10, 2 + t / 1000 * 4);\n          const mag = Math.pow(10, Math.floor(Math.log10(shu)) - 1);\n          this.setOverride(r.id, { your: Math.round(shu / mag) * mag });\n        },\n        onRate: (e) => {\n          const v = +e.currentTarget.dataset.val;\n          this.setOverride(r.id, { rating: v === r.rating ? 0 : v });\n        },\n        onReset: (e) => { e.stopPropagation(); this.setOverride(r.id, { your: null, rating: 0 }); },\n        onDelete: (e) => {\n          e.stopPropagation();\n          const userSauces = st.userSauces.filter(u => u.id !== r.id);\n          this.setState({ userSauces, expandedId: null });\n          this.persist({ userSauces });\n        }\n      };\n    });\n\n    const ticks = [0, 1, 2, 3, 4].map(i => {\n      const frac = i / 4;\n      const val = scale === 'linear'\n        ? domain.min + frac * (domain.max - domain.min)\n        : Math.pow(10, Math.log10(domain.min) + frac * (Math.log10(domain.max) - Math.log10(domain.min)));\n      return { label: fmt(val), left: i * 25, tx: i === 0 ? '0%' : (i === 4 ? '-100%' : '-50%') };\n    });\n\n    const chip = (label, active, onPick) => ({ label, bg: active ? 'var(--ink)' : '#FFFFFF', fg: active ? '#FFFFFF' : 'var(--ink)', onPick });\n\n    // --- Pepper scale strip ---\n    const pepperVals = this.PEPPERS.map(p => p.guess);\n    const pMin = Math.min(...pepperVals), pMax = Math.max(...pepperVals);\n    const pepperDomain = scale === 'linear'\n      ? { min: 0, max: Math.min(this.niceCeil(pMax), SHU_MAX) }\n      : { min: this.niceFloor(pMin), max: Math.min(this.niceCeil(pMax), SHU_MAX) };\n    const pepperTicks = [0, 1, 2, 3, 4].map(i => {\n      const frac = i / 4;\n      const val = scale === 'linear'\n        ? pepperDomain.min + frac * (pepperDomain.max - pepperDomain.min)\n        : Math.pow(10, Math.log10(pepperDomain.min) + frac * (Math.log10(pepperDomain.max) - Math.log10(pepperDomain.min)));\n      return { label: fmt(val), left: i * 25, tx: i === 0 ? '0%' : (i === 4 ? '-100%' : '-50%') };\n    });\n    // Row assignment: greedy, using estimated label widths so labels never share a row while overlapping.\n    const TRACK_PX = 1125; // approx track width at max layout width\n    const ts = this.props.typeScale != null ? this.props.typeScale : 1;\n    const withLeft = this.PEPPERS.map(p => {\n      const left = this.pos(p.guess, pepperDomain);\n      const shuLine = fmt(p.guess) + ' SHU';\n      const labelPx = Math.max(p.name.length * 6.5 * ts, shuLine.length * 5 * ts) + 8;\n      const halfW = (labelPx / TRACK_PX) * 100 / 2;\n      const labelLeft = Math.max(halfW, Math.min(100 - halfW, left));\n      return { p, left, halfW, labelLeft };\n    }).sort((a, b) => a.left - b.left);\n    const MAX_ROWS = 10, PAD = 0.8;\n    const rowRight = [];\n    withLeft.forEach(item => {\n      const leftEdge = item.labelLeft - item.halfW;\n      let row = rowRight.findIndex(v => leftEdge >= v + PAD);\n      if (row === -1) {\n        if (rowRight.length < MAX_ROWS) row = rowRight.length;\n        else row = rowRight.indexOf(Math.min(...rowRight)); // least-bad fallback\n      }\n      rowRight[row] = Math.max(rowRight[row] != null && row < rowRight.length ? rowRight[row] : -100, item.labelLeft + item.halfW);\n      item.row = row;\n    });\n    const baseDist = 28, bandGap = 40;\n    const maxRow = Math.max(0, ...withLeft.map(i => i.row));\n    const maxBand = Math.floor(maxRow / 2);\n    const pepperStripH = 2 * (baseDist + maxBand * bandGap + 52);\n    const pepperMarkers = withLeft.map(({ p, left, labelLeft, row }) => {\n      const dir = row % 2 === 0 ? 1 : -1;\n      const band = Math.floor(row / 2);\n      const dist = baseDist + band * bandGap;\n      const t = left / 100;\n      const size = 9 + t * 11;\n      const center = pepperStripH / 2;\n      const iconTop = center + dir * dist;\n      const lineTop = dir > 0 ? center : iconTop + size / 2;\n      const lineHeight = Math.max(dist - size / 2, 4);\n      const labelTop = dir > 0 ? iconTop + size / 2 + 6 : iconTop - size / 2 - 6;\n      return {\n        name: p.name, guessFmt: fmt(p.guess),\n        left, labelShiftPx: Math.round((labelLeft - left) / 100 * TRACK_PX),\n        size, iconTop, lineTop, lineHeight, labelTop,\n        labelTy: dir > 0 ? '0' : '-100%'\n      };\n    });\n\n    return {\n      catChips: [\n        chip('All', st.cats.length === 0, () => this.setState({ cats: [] })),\n        chip('Season 30', st.cats.includes('pack'), () => this.toggleCat('pack')),\n        chip('Benchmarks', st.cats.includes('bench'), () => this.toggleCat('bench')),\n        chip('Mine', st.cats.includes('mine'), () => this.toggleCat('mine'))\n      ],\n      pepperScaleLabel: scale === 'linear' ? 'Linear' : 'Log',\n      pepperOpen: st.pepperOpen,\n      onTogglePeppers: () => this.setState({ pepperOpen: !st.pepperOpen }),\n      pepperChevron: st.pepperOpen ? '−' : '+',\n      pepperTicks,\n      pepperStripH,\n      pepperMarkers,\n      scaleChips: [\n        chip('Log', scale === 'log', () => this.setState({ scale: 'log' })),\n        chip('Linear', scale === 'linear', () => this.setState({ scale: 'linear' }))\n      ],\n      metric: st.metric,\n      onMetric: (e) => this.setState({ metric: e.target.value }),\n      sort: st.sort,\n      onSort: (e) => this.setState({ sort: e.target.value }),\n      ignoreClaimedBg: st.ignoreClaimed ? 'var(--ink)' : '#FFFFFF',\n      ignoreClaimedFg: st.ignoreClaimed ? '#FFFFFF' : 'var(--ink)',\n      onIgnoreClaimed: () => this.setState({ ignoreClaimed: !st.ignoreClaimed }),\n      query: st.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      countLine: viewRows.length + ' of ' + all.length + ' sauces · ' + scale + ' scale',\n      metricLabel: metricLabels[metric],\n      ticks,\n      rows: viewRows,\n      noResults: viewRows.length === 0,\n      nameRef: this.nameRef, makerRef: this.makerRef, claimedRef: this.claimedRef, lowRef: this.lowRef, highRef: this.highRef,\n      hasAddError: !!st.addError,\n      addError: st.addError,\n      onAdd: () => {\n        const name = (this.nameRef.current.value || '').trim();\n        if (!name) { this.setState({ addError: 'A sauce needs a name.' }); return; }\n        const num = ref => { const v = parseFloat(ref.current.value); return isNaN(v) || v <= 0 ? null : Math.min(v, 2500000); };\n        let claimed = num(this.claimedRef), low = num(this.lowRef), high = num(this.highRef);\n        if (low != null && high != null && low > high) { const t = low; low = high; high = t; }\n        let guess;\n        if (low != null && high != null) guess = Math.round(Math.sqrt(low * high));\n        else guess = low != null ? low : (high != null ? high : (claimed != null ? claimed : 1000));\n        if (low == null) low = Math.round(guess * 0.6);\n        if (high == null) high = Math.round(guess * 1.6);\n        const id = 'user-' + Date.now();\n        const sauce = { id, name, maker: (this.makerRef.current.value || '').trim() || 'Home addition', cat: 'My sauces', pack: null, claimed, low, high, guess };\n        const userSauces = st.userSauces.concat([sauce]);\n        this.setState({ userSauces, addError: '', expandedId: id });\n        this.persist({ userSauces });\n        this.nameRef.current.value = ''; this.makerRef.current.value = '';\n        this.claimedRef.current.value = ''; this.lowRef.current.value = ''; this.highRef.current.value = '';\n      },\n      showGuide: this.props.showGuide != null ? this.props.showGuide : true,\n      theme\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
