document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    // Google Analytics (GA4) — injected into the template head so it survives
    // the documentElement swap below. Inline bootstrap (no src) appends the
    // async gtag.js loader at runtime, so it never blocks the page's scripts.
    const gaSnippet = '<script>window.dataLayer=window.dataLayer||[];' +
      'function gtag(){dataLayer.push(arguments);}window.gtag=gtag;' +
      'gtag("js",new Date());gtag("config","G-WZGPQSX3XJ");' +
      'var gaS=document.createElement("script");gaS.async=1;' +
      'gaS.src="https://www.googletagmanager.com/gtag/js?id=G-WZGPQSX3XJ";' +
      'document.head.appendChild(gaS);</' + 'script>';
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + gaSnippet + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

255,0.14);background:linear-gradient(160deg,rgba(38,22,74,0.66),rgba(16,8,34,0.6));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:0 0 60px rgba(140,60,255,0.18),inset 0 1px 0 rgba(255,255,255,0.08)\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center\">\n        <span style=\"font-size:9px;letter-spacing:0.2em;color:#C4B5FD;border:1px solid rgba(196,181,253,0.35);border-radius:999px;padding:4px 10px;text-transform:uppercase\">{{ selTag }}<\u002Fspan>\n        <button onclick=\"{{ onClear }}\" style=\"border:none;background:none;color:rgba(230,220,255,0.6);font-size:16px;cursor:pointer;padding:2px 6px;font-family:inherit\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;font-size:22px;line-height:1.15;font-weight:700;color:#F4F1FF\">{{ selName }}<\u002Fdiv>\n      <div style=\"margin-top:6px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(196,186,240,0.6)\">{{ selMaker }}<\u002Fdiv>\n      <div style=\"margin-top:22px;font-size:9px;letter-spacing:0.22em;color:rgba(160,150,210,0.6)\">BEST GUESS<\u002Fdiv>\n      <div style=\"margin-top:4px;font-size:40px;font-weight:700;letter-spacing:-0.01em;background:linear-gradient(100deg,#38BDF8,#E879F9 55%,#FDBA74);-webkit-background-clip:text;background-clip:text;color:transparent;font-variant-numeric:tabular-nums\">{{ selShuFmt }}<\u002Fdiv>\n      <div style=\"font-size:10px;letter-spacing:0.2em;color:rgba(196,186,240,0.55);margin-top:2px\">SCOVILLE HEAT UNITS<\u002Fdiv>\n      <div style=\"margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;letter-spacing:0.1em;color:#D9D2F5;text-transform:uppercase\">{{ selRank }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:absolute;left:32px;bottom:30px;pointer-events:none\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <span style=\"font-size:9px;letter-spacing:0.2em;color:rgba(125,211,252,0.8)\">MILD<\u002Fspan>\n      <span style=\"width:150px;height:6px;border-radius:3px;background:linear-gradient(90deg,#38BDF8,#818CF8,#E879F9,#FB7185,#FDBA74)\"><\u002Fspan>\n      <span style=\"font-size:9px;letter-spacing:0.2em;color:rgba(253,186,116,0.85)\">REGRET<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top:8px;font-size:9px;letter-spacing:0.16em;color:rgba(160,150,210,0.55);text-transform:uppercase\">{{ legendLine }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:0.22em;color:rgba(190,180,240,0.55);text-transform:uppercase;pointer-events:none;white-space:nowrap\">Drag to orbit · Scroll to zoom · Click an orb<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;autoRotate&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Scene&quot;},&quot;glowIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:0.5,&quot;max&quot;:1.8,&quot;step&quot;:0.05,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Scene&quot;},&quot;showBenchmarks&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Data&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.SAUCES = [\n      { id: 'tb-mild', name: 'Taco Bell Mild Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, guess: 400 },\n      { id: 'franks', name: \"Frank's RedHot\", maker: \"McIlhenny/Frank's\", cat: 'Benchmark', pack: null, guess: 450 },\n      { id: 'louisiana', name: 'Louisiana Hot Sauce', maker: 'Bruce Foods', cat: 'Benchmark', pack: null, guess: 450 },\n      { id: 'tb-hot', name: 'Taco Bell Hot Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, guess: 800 },\n      { id: 'cholula-jal', name: 'Cholula Jalapeño', maker: 'Cholula', cat: 'Benchmark', pack: null, guess: 1000 },\n      { id: 'cholula-chip', name: 'Cholula Chipotle', maker: 'Cholula', cat: 'Benchmark', pack: null, guess: 1500 },\n      { id: 'shishito', name: \"That's What Shishito Said\", maker: 'Down to Ferment', cat: 'Season 30 Pack', pack: 1, guess: 2000 },\n      { id: 'tb-diablo', name: 'Taco Bell Diablo Sauce', maker: 'Taco Bell', cat: 'Benchmark', pack: null, guess: 2000 },\n      { id: 'sriracha', name: 'Huy Fong Sriracha', maker: 'Huy Fong Foods', cat: 'Benchmark', pack: null, guess: 2200 },\n      { id: 'hot-bergine', name: 'Hot Bergine', maker: 'Good Heat', cat: 'Season 30 Pack', pack: 2, guess: 2500 },\n      { id: 'marie-sharps', name: \"Marie Sharp's Original Hot Habanero\", maker: \"Marie Sharp's\", cat: 'Benchmark', pack: null, guess: 3000 },\n      { id: 'tabasco', name: 'Tabasco Original', maker: 'McIlhenny Co.', cat: 'Benchmark', pack: null, guess: 3500 },\n      { id: 'pickled-garlic', name: 'Pickled Garlic Sriracha', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 3, guess: 5000 },\n      { id: 'chickpotle', name: 'Chickpotle', maker: 'Black Eyed Susan', cat: 'Season 30 Pack', pack: 4, guess: 9000 },\n      { id: 'tropical-amarillo', name: 'Tropical Amarillo', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 6, guess: 18000 },\n      { id: 'eight-dragon', name: '8 Dragon', maker: 'Sinai Gourmet', cat: 'Season 30 Pack', pack: 7, guess: 20000 },\n      { id: 'pikliz', name: 'Pikliz N Scorpion', maker: 'Hot N Saucy', cat: 'Season 30 Pack', pack: 5, guess: 25000 },\n      { id: 'xxx-salsa', name: 'XXX Salsa Vibes', maker: 'High Desert Sauce Co.', cat: 'Season 30 Pack', pack: 9, guess: 70000 },\n      { id: 'number-8', name: '\"#8\"', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 8, guess: 150000 },\n      { id: 'last-dab', name: 'Last Dab Thermageddon', maker: 'Hot Ones Hot Sauce', cat: 'Season 30 Pack', pack: 10, guess: 150000 }\n    ];\n    this.state = { selectedId: null, hoverId: null, userSauces: [], mode: 'helix' };\n    this.canvasRef = React.createRef();\n    this.cur = {};\n    this.rotY = 0.6; this.rotX = 0.32; this.zoom = 1;\n    this.dragging = false; this.moved = 0; this.lastX = 0; this.lastY = 0;\n    this.projected = [];\n    this.dpr = 1;\n    this.STOPS = [[56, 189, 248], [129, 140, 248], [232, 121, 249], [251, 113, 133], [253, 186, 116]];\n    this.stars = [];\n    for (let i = 0; i < 170; i++) {\n      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1), rr = 750 + Math.random() * 700;\n      this.stars.push({ x: rr * Math.sin(ph) * Math.cos(th), y: rr * Math.cos(ph) * 0.6, z: rr * Math.sin(ph) * Math.sin(th), a: 0.2 + Math.random() * 0.5 });\n    }\n  }\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('scoville-index-v1');\n      if (raw) {\n        const d = JSON.parse(raw);\n        if (d.userSauces) this.setState({ userSauces: d.userSauces });\n      }\n    } catch (e) {}\n    const cv = this.canvasRef.current;\n    this.onDown = (e) => { this.dragging = true; this.moved = 0; this.lastX = e.clientX; this.lastY = e.clientY; if (cv) cv.style.cursor = 'grabbing'; };\n    this.onUp = () => { this.dragging = false; if (cv) cv.style.cursor = 'grab'; };\n    this.onMove = (e) => {\n      if (this.dragging) {\n        const dx = e.clientX - this.lastX, dy = e.clientY - this.lastY;\n        this.moved += Math.abs(dx) + Math.abs(dy);\n        this.rotY += dx * 0.005;\n        this.rotX = Math.max(0.02, Math.min(1.25, this.rotX + dy * 0.0035));\n        this.lastX = e.clientX; this.lastY = e.clientY;\n      }\n    };\n    this.onHover = (e) => {\n      if (this.dragging || !cv) return;\n      const r = cv.getBoundingClientRect();\n      const hit = this.pick(e.clientX - r.left, e.clientY - r.top);\n      const id = hit ? hit.id : null;\n      if (id !== this.state.hoverId) this.setState({ hoverId: id });\n      cv.style.cursor = hit ? 'pointe \n  }\n\n  heatColor(t, a) {\n    const st = this.STOPS, n = st.length - 1;\n    const x = Math.max(0, Math.min(1, t)) * n, i = Math.min(n - 1, Math.floor(x)), f = x - i;\n    const c = [0, 1, 2].map(k => Math.round(st[i][k] + (st[i + 1][k] - st[i][k]) * f));\n    return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')';\n  }\n\n  project(x, y, z, w, h) {\n    const cy = Math.cos(this.rotY), sy = Math.sin(this.rotY);\n    const x1 = x * cy - z * sy, z1 = x * sy + z * cy;\n    const cx = Math.cos(this.rotX), sx = Math.sin(this.rotX);\n    const y1 = y * cx - z1 * sx, z2 = y * sx + z1 * cx;\n    const P = 950, d = P + z2;\n    if (d < 80) return null;\n    const s = (P / d) * this.zoom;\n    return { x: w / 2 + x1 * s, y: h * 0.52 + y1 * s, s, z: z2 };\n  }\n\n  pick(mx, my) {\n    let best = null, bd = 1e9;\n    for (const p of this.projected) {\n      const dx = p.x - mx, dy = p.y - my, dist = Math.sqrt(dx * dx + dy * dy);\n      if (dist < Math.max(11, p.rr + 6) && dist < bd) { bd = dist; best = p; }\n    }\n    return best;\n  }\n\n  targets(now) {\n    const mode = this.state.mode;\n    const data = this.list();\n    const lgs = data.map(s => Math.log10(s.guess));\n    const lmin = Math.min(...lgs) - 0.1, lmax = Math.max(...lgs) + 0.08;\n    const tOf = (g) => (Math.log10(g) - lmin) / (lmax - lmin);\n    const rings = [], pts = [];\n    let sun = false;\n    if (mode === 'helix') {\n      const H = 520, R0 = 235;\n      const yFor = (l) => H / 2 - (l - lmin) / (lmax - lmin) * H;\n      data.forEach((s, i) => {\n        const t = tOf(s.guess);\n        const a = i * 2.39996 + 0.7;\n        const r = R0 + ((i * 53) % 70) - 35;\n        pts.push({ s, t, x: r * Math.cos(a), y: yFor(Math.log10(s.guess)), z: r * Math.sin(a), size: 4.5 + Math.pow(t, 1.4) * 15 });\n      });\n      for (const v of [1000, 10000, 100000, 1000000]) {\n        const l = Math.log10(v);\n        if (l >= lmin && l <= lmax + 0.25) rings.push({ v, y: yFor(l), r: 320 });\n      }\n    } el   if (!this.ctx) this.ctx = cv.getContext('2d');\n    const ctx = this.ctx;\n    const auto = this.props.autoRotate != null ? this.props.autoRotate : true;\n    if (!this.dragging && auto) this.rotY += 0.0022;\n    const glow = this.props.glowIntensity != null ? this.props.glowIntensity : 1;\n\n    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);\n    ctx.clearRect(0, 0, w, h);\n\n    // stars\n    ctx.globalCompositeOperation = 'source-over';\n    for (const st of this.stars) {\n      const p = this.project(st.x, st.y, st.z, w, h);\n      if (!p) continue;\n      ctx.fillStyle = 'rgba(190,180,255,' + (st.a * 0.45) + ')';\n      ctx.fillRect(p.x, p.y, 1.4, 1.4);\n    }\n\n    const now = performance.now();\n    const { pts, rings, sun } = this.targets(now);\n\n    // SHU rings\n    ctx.globalCompositeOperation = 'source-over';\n    for (const ring of rings) {\n      this.drawRing(ctx, ring.r, ring.y, w, h, 'rgba(150,130,255,0.14)', 1);\n      const lp = this.project(ring.r * Math.cos(-this.rotY), ring.y, ring.r * Math.sin(-this.rotY), w, h);\n      if (lp) {\n        ctx.fillStyle = 'rgba(190,175,255,0.55)';\n        ctx.font = '500 10px \"Space Grotesk\", Helvetica, sans-serif';\n        ctx.fillText((ring.v >= 1000000 ? '1M' : (ring.v / 1000) + 'K') + ' SHU', lp.x + 10, lp.y - 4);\n      }\n    }\n    if (sun) {\n      for (const pt of pts) this.drawRing(ctx, pt.orbitR, pt.y, w, h, this.heatColor(pt.t, 0.07), 1);\n    }\n\n    // ease every planet toward the active layout\n    const k = 0.1;\n    for (const pt of pts) {\n      const c = this.cur[pt.s.id];\n      if (!c) { this.cur[pt.s.id] = { x: pt.x, y: pt.y, z: pt.z, size: pt.size }; }\n      else { c.x += (pt.x - c.x) * k; c.y += (pt.y - c.y) * k; c.z += (pt.z - c.z) * k; c.size += (pt.size - c.size) * k; }\n    }\n\n    // the capsaicin sun\n    if (sun) {\n      const sp = this.project(0, 0, 0, w, h);\n      if (sp) {\n        const sr = 26 * sp.s * (1 + 0.05 * Math.sin(now * 0.0025));\n        ctx.globalCo
